# Consulting KPI Templates
- model: kpi.kpitemplate
  pk: 30
  fields:
    name: "Billable Hours"
    code: "BILL_001"
    sector: 4
    category: 1
    description: "Number of billable hours per consultant"
    difficulty: "BEGINNER"
    kpi_definition:
      name: "Billable Hours"
      kpi_type: "COUNT"
      calculation_logic: "HIGHER_IS_BETTER"
      measure_type: "CUMULATIVE"
      unit: "hours"
      decimal_places: 0
    target_phasing_pattern:
      strategy: "equal_split"
    is_published: true
    usage_count: 0
    metadata:
      target_range: "120-160"

