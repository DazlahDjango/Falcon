# Templates
- model: kpi.kpitemplate
  pk: 10
  fields:
    name: "Beneficiaries Reached"
    code: "BEN_001"
    sector: 2
    category: 2
    description: "Number of beneficiaries served by programs"
    difficulty: "BIGINNER"
    kpi_definition:
      name: "Beneficiaries Reached"
      kpi_count: "COUNT"
      calculation_logic: "HIGHER_IS_BETTER"
      measure_type: "CUMULATIVE"
      unit: "people"
    target_phasing_pattern:
      strategy: "seasonal"
      weights:
        1: 0.05
        2: 0.05
        3: 0.08
        4: 0.08
        5: 0.08
        6: 0.08
        7: 0.08
        8: 0.08
        9: 0.10
        10: 0.10
        11: 0.10
        12: 0.12
    is_published: true
    usage_count: 0
    metadata:
      sector_focus: ["education", "health", "economic"]

