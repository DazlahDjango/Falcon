version: '3.8'

services:
  falcon-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: falcon-app-backend
    volumes:
      - .:/workspaces/falcon-pms
    environment:
      - DJANGO_ENV=development
      - PYTHONUNBUFFERED=1
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: postgres:15
    restart: unless-stopped
    volumes:
      - falcon-postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: falcon_pms
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    # Use a different host port to avoid conflicts with any zombie db container
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - falcon-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  falcon-postgres-data:
  falcon-redis-data:
