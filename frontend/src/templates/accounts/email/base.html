<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Falcon PMS{% endblock %}</title>
    <style>
        /* Email Styles */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #f3f4f6;
            margin: 0;
            padding: 0;
            line-height: 1.5;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        .email-wrapper {
            background-color: #ffffff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .email-header {
            background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
            padding: 32px 24px;
            text-align: center;
        }
        .logo {
            margin-bottom: 16px;
        }
        .logo svg {
            width: 48px;
            height: 48px;
        }
        .email-header h1 {
            color: white;
            font-size: 24px;
            font-weight: 600;
            margin: 0;
        }
        .email-body {
            padding: 32px 24px;
        }
        .email-footer {
            background-color: #f9fafb;
            padding: 24px;
            text-align: center;
            border-top: 1px solid #e5e7eb;
            font-size: 12px;
            color: #6b7280;
        }
        .button {
            display: inline-block;
            background-color: #2563eb;
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 500;
            margin: 16px 0;
        }
        .button:hover {
            background-color: #1d4ed8;
        }
        .divider {
            height: 1px;
            background-color: #e5e7eb;
            margin: 24px 0;
        }
        .text-muted {
            color: #6b7280;
            font-size: 14px;
        }
        .text-small {
            font-size: 12px;
            color: #9ca3af;
        }
        @media (max-width: 600px) {
            .container {
                padding: 10px;
            }
            .email-body {
                padding: 24px 16px;
            }
        }
    </style>
    {% block extra_styles %}{% endblock %}
</head>
<body>
    <div class="container">
        <div class="email-wrapper">
            <div class="email-header">
                <div class="logo">
                    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M50 20 L20 35 L50 50 L80 35 L50 20Z" fill="white"/>
                        <path d="M20 50 L50 65 L80 50" fill="white" opacity="0.9"/>
                        <path d="M20 65 L50 80 L80 65" fill="white" opacity="0.8"/>
                        <circle cx="50" cy="50" r="12" fill="#2563eb"/>
                        <path d="M50 44 L54 50 L50 56 L46 50Z" fill="white"/>
                    </svg>
                </div>
                <h1>{% block header %}Falcon PMS{% endblock %}</h1>
            </div>
            
            <div class="email-body">
                {% block content %}{% endblock %}
            </div>
            
            <div class="email-footer">
                <p>&copy; {% now "Y" %} Falcon Consulting. All rights reserved.</p>
                <p class="text-small">
                    Falcon PMS - Performance Management System<br>
                    {% if unsubscribe_url %}
                    <a href="{{ unsubscribe_url }}" style="color: #6b7280;">Unsubscribe</a>
                    {% endif %}
                </p>
            </div>
        </div>
    </div>
</body>
</html>
